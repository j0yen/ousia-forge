domain = "roles"

# PersonRole (needed for Person defined class §6.2)
[[classes]]
iri = "PersonRole"
label = "Person Role"
parent = "BFO:role"
definition = "The social role of being recognized as a person with rights and legal standing."
[classes.annotations]
philosophicalGrounding = "Justice Is Non-Negotiable: personhood confers due process and self-determination."
domainModule = "roles"

# AuthorityRole (§5.3 — authority requires accountability)
[[classes]]
iri = "AuthorityRole"
label = "Authority Role"
parent = "BFO:role"
definition = "A role borne by an entity that exercises legitimate power over others."
subclass_of = ["inheres_in some (BFO:independent_continuant and bearer_of some Accountability)"]
[classes.annotations]
philosophicalGrounding = "Power Demands Restraint: the capacity to act does not create the obligation to act."
aiGuidance = "Any entity bearing AuthorityRole must also bear Accountability. Authority without accountability is structurally deficient."
moralSignificance = "This encodes the principle that power without accountability is a logical constraint, not merely a policy recommendation."
domainModule = "roles"

