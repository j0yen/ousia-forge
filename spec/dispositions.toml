domain = "dispositions"

# CognitiveCapacity (§5.4)
[[classes]]
iri = "CognitiveCapacity"
label = "Cognitive Capacity"
parent = "BFO:disposition"
definition = "A disposition to engage in reasoning, language use, memory, learning, creative, or moral reasoning processes."
[classes.annotations]
philosophicalGrounding = "Reason and Empathy Together: logic without compassion is cold; the fully realized mind integrates both."
domainModule = "dispositions"

# AffectiveCapacity (§5.4)
[[classes]]
iri = "AffectiveCapacity"
label = "Affective Capacity"
parent = "BFO:disposition"
definition = "A disposition to experience empathy, compassion, or aesthetic sensibility."
[classes.annotations]
philosophicalGrounding = "Reason and Empathy Together: compassion without logic is chaos; the fully realized mind integrates both."
domainModule = "dispositions"

# Accountability (§5.3)
[[classes]]
iri = "Accountability"
label = "Accountability"
parent = "BFO:disposition"
definition = "A disposition of an authority-bearing entity to answer for the exercise of its authority."
[classes.annotations]
philosophicalGrounding = "Power Demands Restraint: the capacity to act does not create the obligation to act."
moralSignificance = "Authority without accountability is structurally deficient — a logical constraint, not a policy recommendation."
domainModule = "dispositions"

